name = "echo-chat"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ENVIRONMENT = "production"
DEFAULT_PERSONALITY = "EP"
# PRIMARY LLM — Claude Code CLI Proxy (Claude.ai subscription, free)
CLAUDE_PROXY_URL = "https://claude-proxy.echo-op.com"
# Memory Cortex
SHARED_BRAIN_URL = "https://echo-shared-brain.bmcii1976.workers.dev"
MEMORY_PRIME_URL = "https://echo-memory-prime.bmcii1976.workers.dev"
SENTINEL_MEMORY_URL = "https://echo-sentinel-memory.bmcii1976.workers.dev"
# Engine + Swarm
ENGINE_RUNTIME_URL = "https://echo-engine-runtime.bmcii1976.workers.dev"
SWARM_BRAIN_URL = "https://echo-swarm-brain.bmcii1976.workers.dev"
# Voice
ECHO_SPEAK_URL = "https://tts.echo-op.com"
# Infrastructure
BUILD_ORCHESTRATOR_URL = "https://echo-build-orchestrator.bmcii1976.workers.dev"
KNOWLEDGE_FORGE_URL = "https://echo-knowledge-forge.bmcii1976.workers.dev"
OMNISYNC_URL = "https://omniscient-sync.bmcii1976.workers.dev"
ECHO_RELAY_URL = "https://echo-relay.bmcii1976.workers.dev"
SHADOWGLASS_URL = "https://shadowglass-v8-warpspeed.bmcii1976.workers.dev"
FORGEX_URL = "https://forge-x-cloud.bmcii1976.workers.dev"
# Auth
COMMANDER_EMAIL = "bmcii1976@gmail.com"

[[d1_databases]]
binding = "DB"
database_name = "echo-chat"
database_id = "8d7554ca-fd7b-4b38-90e9-495b021d1d33"

[[kv_namespaces]]
binding = "CACHE"
id = "a39af240354041158e0a9163cb6fc589"

# Service Bindings — Worker-to-Worker direct communication
# Required because same-account Workers can't fetch via *.workers.dev URLs
[[services]]
binding = "ENGINE_RUNTIME_SVC"
service = "echo-engine-runtime"

[[services]]
binding = "SHARED_BRAIN_SVC"
service = "echo-shared-brain"

[[services]]
binding = "MEMORY_PRIME_SVC"
service = "echo-memory-prime"

[[services]]
binding = "SENTINEL_MEMORY_SVC"
service = "echo-sentinel-memory"

[[services]]
binding = "SWARM_BRAIN_SVC"
service = "echo-swarm-brain"

[[services]]
binding = "BUILD_ORCHESTRATOR_SVC"
service = "echo-build-orchestrator"

[[services]]
binding = "KNOWLEDGE_FORGE_SVC"
service = "echo-knowledge-forge"

[[services]]
binding = "OMNISYNC_SVC"
service = "omniscient-sync"

[[services]]
binding = "SHADOWGLASS_SVC"
service = "shadowglass-v8-warpspeed"

[[services]]
binding = "FORGEX_SVC"
service = "forge-x-cloud"

[[services]]
binding = "ECHO_RELAY_SVC"
service = "echo-relay"
